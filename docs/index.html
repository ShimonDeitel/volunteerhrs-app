<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Volunteerhrs</title>
<style>
  body { margin:0; background: #0b0d10; color: #f2f2f2; font-family: -apple-system, Helvetica, Arial, sans-serif; }
  .wrap { max-width: 640px; margin: 0 auto; padding: 96px 24px; text-align: center; }
  h1 { font-size: 2.4rem; margin-bottom: 8px; color: #1E8C6D; }
  p.tag { color: #b7b7b7; font-size: 1.15rem; margin-bottom: 40px; }
  .badge { display:inline-block; padding: 10px 22px; border-radius: 999px; background:#1E8C6D; color:#0b0d10; font-weight:600; }
  .features { margin-top: 56px; text-align:left; }
  .features li { margin-bottom: 12px; color:#d8d8d8; }
  footer { margin-top: 80px; color:#666; font-size:.85rem; }
  a { color:#1E8C6D; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #1E8C6D55 0%, #1E8C6D00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
  <div class="wrap">
    <h1>Volunteerhrs</h1>
    <p class="tag">Log volunteer hours toward graduation or scholarship requirements.</p>
    <span class="badge">Available on iOS</span>
    <ul class="features">
      <li>Volunteer hour log with running total</li>
      <li>Pro: Exportable signed hour report</li>
      <li>Offline-first. Your data stays on your device.</li>
    </ul>
    <footer>
      <a href="privacy.html">Privacy Policy</a> &middot; <a href="terms.html">Terms of Use</a><br>
      Contact: s0533495227@gmail.com
    </footer>
  </div>
</body>
</html>
